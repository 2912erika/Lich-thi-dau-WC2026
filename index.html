      .main-bg-wrapper { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; }
      .main-bg { width: 110%; height: 110%; position: absolute; top: -5%; left: -5%; background: linear-gradient(rgba(1, 4, 9, 0.85), rgba(1, 4, 9, 0.95)), url("https://library.sportingnews.com/styles/twitter_card_120x120/s3/2025-11/World-Cup-2026-umbrella-FTR-%281%29.jpg?itok=EmUuGN-R"); background-size: cover; background-position: center; animation: ken-burns 40s infinite alternate ease-in-out; }
      @keyframes ken-burns { from { transform: scale(1); } to { transform: scale(1.1); } }
      
      .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(25px); border: 1px solid rgba(212, 175, 55, 0.2); }
      .worldcup-font { font-family: "Goldman", cursive; }

      /* Sidebar */
      #sidebar { position: fixed; top: 0; left: -350px; width: 320px; height: 100%; background: rgba(1, 10, 25, 0.98); backdrop-filter: blur(40px); z-index: 1000; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); border-right: 1px solid rgba(212, 175, 55, 0.3); }
      #sidebar.active { left: 0; }
      .menu-item { padding: 1.2rem 2rem; border-bottom: 1px solid rgba(255, 255, 255, 0.05); transition: 0.3s; cursor: pointer; display: flex; align-items: center; gap: 15px; font-weight: 800; text-transform: uppercase; font-size: 14px; color: #cbd5e1; }
      .menu-item:hover { background: rgba(212, 175, 55, 0.15); color: #d4af37; }
      #overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.8); z-index: 950; display: none; }

      /* Team Card */
      @keyframes blink-gold { 0%, 100% { border-color: rgba(212, 175, 55, 0.2); box-shadow: 0 0 15px rgba(212, 175, 55, 0.1); } 50% { border-color: rgba(212, 175, 55, 1); box-shadow: 0 0 30px rgba(212, 175, 55, 0.4); } }
      .team-circle { transition: all 0.4s ease; border: 3px solid rgba(212, 175, 55, 0.3); animation: blink-gold 3s infinite ease-in-out; display: flex; flex-direction: column; align-items: center; padding: 2rem 1.5rem; border-radius: 3rem; min-height: 450px; cursor: pointer; }
      .team-circle:hover { transform: translateY(-10px) scale(1.02); background: rgba(212, 175, 55, 0.1); }

      .phase-btn { background: rgba(30, 41, 59, 0.6); border: 1px solid rgba(255, 255, 255, 0.1); transition: 0.2s; color: #94a3b8; font-size: 14px; font-weight: 700; }
      .phase-btn.active { background: #d4af37 !important; color: #001f3f !important; font-weight: 900; transform: scale(1.1); }
      
      .match-mini { width: 100%; margin-top: 1.5rem; border-top: 1px solid rgba(212, 175, 55, 0.2); padding-top: 1rem; }
      .match-mini-item { display: flex; flex-direction: column; margin-bottom: 0.75rem; font-size: 13px; }
      .match-mini-header { display: flex; justify-content: space-between; font-weight: 600; color: #94a3b8; margin-bottom: 2px; }
      .match-mini-vs { color: #ffffff; font-weight: 800; text-align: center; }
      .match-mini-time { color: #d4af37; font-family: "Goldman"; font-weight: 700; }

      /* Popup Team Detail - CẬP NHẬT HIỂN THỊ ẢNH */
      #team-popup { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 2000; width: 90%; max-width: 700px; max-height: 85vh; overflow-y: auto; border-radius: 3rem; border: 2px solid #d4af37; box-shadow: 0 0 50px rgba(0,0,0,0.9); }
      .no-scrollbar::-webkit-scrollbar { display: none; }
      
      .popup-img-container {
        width: 100%;
        background: rgba(0, 0, 0, 0.3);
        border-radius: 1.5rem;
        overflow: hidden;
        border: 2px solid rgba(212, 175, 55, 0.4);
        box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        display: flex;
        justify-content: center;
        align-items: center;
      }

      /* object-fit: contain giúp hiển thị trọn vẹn toàn bộ ảnh không bị cắt */
      .popup-team-img {
        width: 100%;
        height: auto;
        max-height: 400px;
        object-fit: contain; 
        display: block;
      }

        Object.keys(groupTeams).forEach((id) => {
          const btn = document.createElement("button"); btn.className = "phase-btn px-6 py-3 rounded-2xl font-black uppercase";
          btn.innerText = "Bảng " + id; btn.onclick = () => renderGroupIcons(id, btn); subNav.appendChild(btn);
        });
        renderGroupIcons("A", subNav.firstChild); renderTopMatches();
      }

      function getTeamMatches(teamName) {
        let res = [];
        for (let day in vongBangDays) {
          vongBangDays[day].forEach(m => { if (m.h === teamName || m.a === teamName) res.push({...m, d: day}); });
        }
        return res;
      }

      function openTeamPopup(teamName) {
        let teamData = null;
        for(let g in groupTeams) {
            const found = groupTeams[g].find(t => t.n === teamName);
            if(found) { teamData = found; break; }
        }
        if(!teamData) return;

        const matches = getTeamMatches(teamName);
        const popup = document.getElementById("team-popup");
        const overlay = document.getElementById("overlay");
        const content = document.getElementById("popup-content");

        content.innerHTML = `
            <div class="flex flex-col items-center">
                <h3 class="worldcup-font text-4xl text-[#d4af37] mb-6 uppercase text-center">${teamData.n}</h3>
                <div class="popup-img-container mb-8">
                    <img src="${teamData.api}" class="popup-team-img" onerror="this.src='https://via.placeholder.com/600x400?text=FIFA+WORLD+CUP+2026'">
                </div>
                <div class="w-full">
                    <p class="worldcup-font text-xl text-white border-b-2 border-[#d4af37]/30 pb-2 mb-6 uppercase italic tracking-widest text-center">Lịch Thi Đấu Đội Tuyển</p>
                    <div class="grid grid-cols-1 gap-4">
                        ${matches.map(m => `
                            <div class="glass p-5 rounded-3xl flex justify-between items-center border border-white/5">
                                <div class="text-left"><span class="block text-slate-400 font-bold text-xs uppercase">${m.d}</span><span class="text-white font-black text-lg uppercase tracking-tighter">vs ${m.h === teamName ? m.a : m.h}</span></div>
                                <div class="text-right"><span class="worldcup-font text-[#00f2ff] text-2xl">${m.t}</span><span class="block text-[9px] text-[#d4af37] font-bold uppercase tracking-widest">Bảng ${m.g}</span></div>
                            </div>
                        `).join("")}
                    </div>
                </div>
            </div>
        `;
        popup.style.display = "block";
        overlay.style.display = "block";
      }

      function closePopup() {
        document.getElementById("team-popup").style.display = "none";
        document.getElementById("overlay").style.display = "none";
      }

      function renderGroupIcons(id, btn) {
        document.querySelectorAll(".phase-btn").forEach(b => b.classList.remove("active")); if (btn) btn.classList.add("active");
        const teams = groupTeams[id];
        document.getElementById("main-display").innerHTML = `
          <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 w-full max-w-7xl">
            ${teams.map(t => {
              const ms = getTeamMatches(t.n);
              return `
                <div class="team-circle glass" onclick="openTeamPopup('${t.n}')">
                  <img src="https://flagcdn.com/w320/${t.c}.png" class="w-24 h-24 rounded-full object-cover mb-4 border-2 border-white/20 shadow-2xl">
                  <span class="font-black text-3xl uppercase text-white text-center tracking-tighter">${t.n}</span>
                  <div class="match-mini">
                    ${ms.map(m => `
                      <div class="match-mini-item">
                        <div class="match-mini-header"><span>${m.d}</span><span class="match-mini-time">${m.t}</span></div>
                        <div class="match-mini-vs">vs ${m.h === t.n ? m.a : m.h}</div>
                      </div>`).join("")}
                  </div>
                  <span class="mt-auto text-[10px] text-[#d4af37] font-bold uppercase tracking-[0.2em] opacity-60">Xem Đội Tuyển</span>
                </div>`;
            }).join("")}
          </div>`;
      }

      function renderTopMatches() {
        const matches = [
            { d: "12/06", g: "02:00", b: "A", h: "Mexico", a: "Nam Phi", hc: "mx", ac: "za" },
            { d: "12/06", g: "09:00", b: "A", h: "Hàn Quốc", a: "C.H Séc", hc: "kr", ac: "cz" },
            { d: "13/06", g: "02:00", b: "B", h: "Canada", a: "Bosnia", hc: "ca", ac: "ba" },
            { d: "13/06", g: "08:00", b: "D", h: "Mỹ", a: "Paraguay", hc: "us", ac: "py" }
        ];
        document.getElementById("recent-grid").innerHTML = matches.map(m => `
          <div class="glass p-5 rounded-3xl border-l-4 border-l-[#D4AF37] hover:bg-white/5 transition-all">
            <div class="flex justify-between items-center mb-3"><span class="text-[12px] font-bold text-slate-500 uppercase">Bảng ${m.b} • ${m.d}</span><span class="text-[12px] font-black text-[#D4AF37] bg-[#D4AF37]/10 px-2 py-0.5 rounded-full font-goldman">${m.g}</span></div>
            <div class="flex flex-col gap-2">
              <div class="flex items-center gap-3"><img src="https://flagcdn.com/w40/${m.hc}.png" class="w-6 h-4"><span class="text-lg font-black uppercase text-white">${m.h}</span></div>
              <div class="flex items-center gap-3"><img src="https://flagcdn.com/w40/${m.ac}.png" class="w-6 h-4"><span class="text-lg font-black uppercase text-white">${m.a}</span></div>
            </div>
          </div>`).join("");
      }

      function switchToDayMode() { toggleMenu(false); document.getElementById("top-matches-section").style.display = "none"; document.getElementById("display-title").innerText = "Lịch Theo Ngày"; const subNav = document.getElementById("sub-navigation"); subNav.innerHTML = ""; Object.keys(vongBangDays).forEach(day => { const btn = document.createElement("button"); btn.className = "phase-btn px-4 py-2 rounded-xl uppercase"; btn.innerText = day; btn.onclick = () => renderVongBangDay(day, btn); subNav.appendChild(btn); }); renderVongBangDay("12/06", subNav.firstChild); }
      function renderVongBangDay(day, btn) { document.querySelectorAll(".phase-btn").forEach(b => b.classList.remove("active")); if (btn) btn.classList.add("active"); const matches = vongBangDays[day]; document.getElementById("main-display").innerHTML = `<div class="space-y-6 w-full max-w-5xl">${matches.map(m => `<div class="glass p-8 rounded-[3rem] border border-white/10 flex items-center justify-between hover:bg-white/5 transition-all"><div class="w-40 text-left"><span class="block text-[#D4AF37] font-black text-5xl worldcup-font">${m.t}</span><span class="text-sm text-slate-500 font-bold uppercase tracking-widest">Bảng ${m.g}</span></div><div class="flex-1 text-center font-black uppercase text-3xl text-white"><span>${m.h}</span><span class="px-8 text-[#00f2ff] italic opacity-40 text-xl">vs</span><span>${m.a}</span></div></div>`).join("")}</div>`; }
      function renderKnockout(phase) { toggleMenu(false); document.getElementById("top-matches-section").style.display = "none"; document.getElementById("display-title").innerText = phase; document.getElementById("sub-navigation").innerHTML = ""; const ms = knockoutData[phase] || []; document.getElementById("main-display").innerHTML = `<div class="space-y-6 w-full max-w-5xl">${ms.map(m => `<div class="glass p-8 rounded-[3rem] flex items-center justify-between"><div class="w-40 text-left"><span class="block text-[#D4AF37] font-black text-5xl worldcup-font">#${m.t}</span><span class="text-sm text-slate-500 font-bold uppercase">${m.d}</span></div><div class="flex-1 text-center font-black uppercase text-3xl text-white"><span>${m.h}</span><span class="px-6 text-[#00f2ff] italic opacity-30 text-xl">vs</span><span>${m.a}</span></div><div class="w-40 text-right font-black text-[#00f2ff] text-5xl font-goldman">${m.g}</div></div>`).join("")}</div>`; }
      function triggerFinal() { toggleMenu(false); document.getElementById("top-matches-section").style.display = "none"; document.getElementById("display-title").innerText = "Chung Kết"; document.getElementById("sub-navigation").innerHTML = ""; confetti({ particleCount: 300, spread: 120, origin: { y: 0.6 }, colors: ["#ffffff", "#D4AF37", "#00f2ff"] }); document.getElementById("main-display").innerHTML = `<div class="flex flex-col items-center justify-center py-10 w-full"><div class="glass p-16 rounded-[5rem] border-2 border-[#D4AF37]/50 w-full max-w-4xl text-center shadow-[0_0_50px_rgba(212,175,55,0.2)]"><span class="block text-[#D4AF37] font-black text-7xl worldcup-font mb-4">#104</span><span class="text-2xl text-slate-400 font-bold block mb-12 tracking-[0.4em]">20 THÁNG 7, 2026</span><div class="flex items-center justify-center gap-10 mb-10"><span class="text-5xl font-black text-white uppercase">WINNER 101</span><span class="text-[#D4AF37] worldcup-font text-7xl italic">VS</span><span class="text-5xl font-black text-white uppercase">WINNER 102</span></div><p class="text-[#00f2ff] font-black text-8xl worldcup-font tracking-tighter">02:00</p></div></div>`; }
      
      function updateCountdown() {
        const target = new Date("June 11, 2026 00:00:00").getTime(); const now = new Date().getTime(); const diff = target - now;
        const d = Math.floor(diff / (1000 * 60 * 60 * 24)); const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)); const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)); const s = Math.floor((diff % (1000 * 60)) / 1000);
        document.getElementById("days").innerText = d < 10 ? "0" + Math.max(0, d) : d; document.getElementById("hours").innerText = h < 10 ? "0" + Math.max(0, h) : h; document.getElementById("minutes").innerText = m < 10 ? "0" + Math.max(0, m) : m; document.getElementById("seconds").innerText = s < 10 ? "0" + Math.max(0, s) : s;
      }
      setInterval(updateCountdown, 1000); updateCountdown();
      const skyConfetti = () => { confetti({ particleCount: 1, startVelocity: 0, gravity: 0.4, origin: { x: Math.random(), y: -0.1 }, colors: ["#ffffff", "#D4AF37", "#00f2ff"] }); requestAnimationFrame(skyConfetti); };
      skyConfetti(); initHomeMode();
    </script>
  </body>
</html>
