<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FIFA WORLD CUP 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Goldman:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap");

      body {
        background: #010409;
        color: #f8fafc;
        font-family: "Plus Jakarta Sans", sans-serif;
        margin: 0;
        overflow-x: hidden;
      }
      .main-bg-wrapper {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        overflow: hidden;
      }
      .main-bg {
        width: 110%;
        height: 110%;
        position: absolute;
        top: -5%;
        left: -5%;
        background: linear-gradient(rgba(1, 4, 9, 0.85), rgba(1, 4, 9, 0.95)),
          url("https://library.sportingnews.com/styles/twitter_card_120x120/s3/2025-11/World-Cup-2026-umbrella-FTR-%281%29.jpg?itok=EmUuGN-R");
        background-size: cover;
        background-position: center;
      }
      @keyframes ken-burns {
        from {
          transform: scale(1);
        }
        to {
          transform: scale(1.1);
        }
      }

      .glass {
        background: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(212, 175, 55, 0.2);
      }
      .worldcup-font {
        font-family: "Goldman", cursive;
      }
      /* Top navigation bar (horizontal) */
      #topnav {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        z-index: 1000;
        background: rgba(1, 10, 25, 0.92);
        backdrop-filter: blur(30px);
        border-bottom: 1px solid rgba(212, 175, 55, 0.3);
      }
      .topnav-inner {
        display: flex;
        align-items: center;
        gap: 1.25rem;
        max-width: 1400px;
        margin: 0 auto;
        padding: 0.7rem 1.25rem;
      }
      .topnav-logo {
        color: #d4af37;
        font-size: 1.35rem;
        font-style: italic;
        text-transform: uppercase;
        white-space: nowrap;
        flex-shrink: 0;
      }
      .topnav-items {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        overflow-x: auto;
        scrollbar-width: none;
      }
      .topnav-items::-webkit-scrollbar {
        display: none;
      }
      .nav-pill {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 0.55rem 1.1rem;
        border-radius: 999px;
        font-weight: 800;
        text-transform: uppercase;
        font-size: 13px;
        color: #cbd5e1;
        cursor: pointer;
        white-space: nowrap;
        transition: 0.2s;
        border: 1px solid transparent;
      }
      .nav-pill:hover {
        background: rgba(212, 175, 55, 0.15);
        color: #d4af37;
        border-color: rgba(212, 175, 55, 0.3);
      }
      #overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.8);
        z-index: 950;
        display: none;
      }

      /* Team Card */
      @keyframes blink-gold {
        0%,
        100% {
          border-color: rgba(212, 175, 55, 0.25);
        }
        50% {
          border-color: rgba(212, 175, 55, 0.85);
        }
      }
      .team-circle {
        transition: all 0.4s ease;
        border: 3px solid rgba(212, 175, 55, 0.3);
        animation: blink-gold 3s infinite ease-in-out;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 2rem 1.5rem;
        border-radius: 3rem;
        min-height: 450px;
        cursor: pointer;
      }
      .team-circle:hover {
        transform: translateY(-10px) scale(1.02);
        background: rgba(212, 175, 55, 0.1);
      }

      .phase-btn {
        background: rgba(30, 41, 59, 0.6);
        border: 1px solid rgba(255, 255, 255, 0.1);
        transition: 0.2s;
        color: #94a3b8;
        font-size: 14px;
        font-weight: 700;
        white-space: nowrap;
        margin-bottom: 8px;
      }
      .phase-btn.active {
        background: #d4af37 !important;
        color: #001f3f !important;
        font-weight: 900;
        transform: scale(1.05);
      }

      #sub-navigation {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 10px;
        max-width: 100%;
        margin: 0 auto;
      }

      .match-mini {
        width: 100%;
        margin-top: 1.5rem;
        border-top: 1px solid rgba(212, 175, 55, 0.2);
        padding-top: 1rem;
      }
      .match-mini-item {
        display: flex;
        flex-direction: column;
        margin-bottom: 0.75rem;
        font-size: 13px;
      }
      .match-mini-header {
        display: flex;
        justify-content: space-between;
        font-weight: 600;
        color: #94a3b8;
        margin-bottom: 2px;
      }
      .match-mini-vs {
        color: #ffffff;
        font-weight: 800;
        text-align: center;
      }
      .match-mini-time {
        color: #d4af37;
        font-family: "Goldman";
        font-weight: 700;
      }
      .match-mini-score {
        color: #00f2ff;
        font-family: "Goldman";
        font-weight: 700;
      }

      /* ===== LIVE ===== */
      @keyframes live-pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.35;
        }
      }
      .live-dot {
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #ff3b5c;
        animation: live-pulse 1.2s infinite;
        margin-right: 6px;
      }
      .live-badge {
        display: inline-flex;
        align-items: center;
        background: rgba(255, 59, 92, 0.15);
        border: 1px solid rgba(255, 59, 92, 0.6);
        color: #ff8aa0;
        font-size: 10px;
        font-weight: 900;
        letter-spacing: 0.15em;
        padding: 2px 10px;
        border-radius: 999px;
        text-transform: uppercase;
      }
      .ft-badge {
        display: inline-flex;
        align-items: center;
        background: rgba(0, 242, 255, 0.1);
        border: 1px solid rgba(0, 242, 255, 0.4);
        color: #00f2ff;
        font-size: 10px;
        font-weight: 900;
        letter-spacing: 0.15em;
        padding: 2px 10px;
        border-radius: 999px;
        text-transform: uppercase;
      }
      .score-big {
        font-family: "Goldman", cursive;
        color: #00f2ff;
        font-weight: 700;
      }
      #live-status {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: #64748b;
      }

      /* Popup Team Detail */
      #team-popup {
        display: none;
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 2000;
        width: 95%;
        max-width: 700px;
        max-height: 90vh;
        overflow-y: auto;
        border-radius: 2rem;
        border: 2px solid #d4af37;
        box-shadow: 0 0 50px rgba(0, 0, 0, 0.9);
      }
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }

      .popup-img-container {
        width: 100%;
        background: rgba(0, 0, 0, 0.3);
        border-radius: 1.5rem;
        overflow: hidden;
        border: 2px solid rgba(212, 175, 55, 0.4);
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .popup-team-img {
        width: 100%;
        height: auto;
        max-height: 300px;
        object-fit: contain;
        display: block;
      }
      /* ===== Sơ đồ (knockout bracket) ===== */
      .bk-scroll {
        overflow-x: auto;
        width: 100%;
        padding-bottom: 8px;
      }
      .bk-scroll::-webkit-scrollbar {
        height: 8px;
      }
      .bk-scroll::-webkit-scrollbar-thumb {
        background: rgba(212, 175, 55, 0.4);
        border-radius: 4px;
      }
      .bk-flow {
        display: flex;
        min-width: 1180px;
        padding: 0.5rem 0;
      }
      .bk-round {
        display: flex;
        flex-direction: column;
        width: 224px;
        flex: 0 0 224px;
        padding: 0 18px;
      }
      .bk-rtitle {
        font-family: "Goldman", cursive;
        color: #d4af37;
        font-size: 15px;
        font-style: italic;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        text-align: center;
        margin-bottom: 16px;
      }
      .bk-body {
        height: 1340px;
        display: flex;
        flex-direction: column;
      }
      .bk-pair {
        position: relative;
        display: flex;
        flex-direction: column;
        justify-content: space-around;
        flex: 1;
      }
      .bk-pair.j::after {
        content: "";
        position: absolute;
        left: calc(100% + 16px);
        top: 25%;
        bottom: 25%;
        width: 2px;
        background: rgba(212, 175, 55, 0.35);
      }
      .bk-pair.j::before {
        content: "";
        position: absolute;
        left: calc(100% + 16px);
        top: 50%;
        width: 18px;
        height: 2px;
        background: rgba(212, 175, 55, 0.35);
      }
      .bk-pair.j > .bk-card::after {
        content: "";
        position: absolute;
        left: 100%;
        top: 50%;
        width: 16px;
        height: 2px;
        background: rgba(212, 175, 55, 0.35);
      }
      .bk-card.in::before {
        content: "";
        position: absolute;
        right: 100%;
        top: 50%;
        width: 18px;
        height: 2px;
        background: rgba(212, 175, 55, 0.35);
      }
      .bk-card {
        position: relative;
        background: rgba(19, 27, 48, 0.95);
        border: 1px solid rgba(255, 255, 255, 0.07);
        border-radius: 14px;
        padding: 10px 12px;
        min-height: 78px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 7px;
      }
      .bk-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .bk-no {
        font-family: "Goldman", cursive;
        color: #d4af37;
        font-size: 13px;
      }
      .bk-when {
        font-size: 11px;
        color: #64748b;
        font-weight: 600;
      }
      .bk-cy {
        font-family: "Goldman", cursive;
        color: #00f2ff;
      }
      .bk-t {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .bk-flag {
        width: 20px;
        height: 13px;
        border-radius: 2px;
        object-fit: cover;
        flex: none;
        background: #334155;
      }
      .bk-sh {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 20px;
        height: 13px;
        color: #475569;
        font-size: 12px;
        flex: none;
      }
      .bk-name {
        font-size: 12.5px;
        font-weight: 800;
        color: #e2e8f0;
        text-transform: uppercase;
        letter-spacing: 0.02em;
        line-height: 1.15;
      }
      .bk-dim {
        color: #64748b;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <div class="main-bg-wrapper"><div class="main-bg"></div></div>
    <div id="overlay" onclick="closePopup(); toggleMenu(false);"></div>

    <!-- Popup chi tiết nước -->
    <div id="team-popup" class="glass p-4 md:p-8 no-scrollbar">
      <button
        onclick="closePopup()"
        class="absolute top-4 right-4 text-white text-2xl opacity-70 hover:opacity-100 hover:text-[#d4af37] z-10"
      >
        <i class="fa-solid fa-circle-xmark"></i>
      </button>
      <div id="popup-content"></div>
    </div>

    <nav id="topnav">
      <div class="topnav-inner">
        <span class="topnav-logo worldcup-font">FIFA 2026</span>
        <div class="topnav-items">
          <div class="nav-pill" onclick="location.reload()">
            <i class="fa-solid fa-house"></i> Trang Chủ
          </div>
          <div class="nav-pill" onclick="switchToDayMode()">
            <i class="fa-solid fa-calendar-day"></i> Vòng Bảng
          </div>
          <div class="nav-pill" onclick="renderBracket()">
            <i class="fa-solid fa-diagram-project"></i> Sơ Đồ
          </div>
          <div class="nav-pill" onclick="renderKnockout('Vòng 32 đội')">
            <i class="fa-solid fa-users-viewfinder"></i> Vòng 32
          </div>
          <div class="nav-pill" onclick="renderKnockout('Vòng 16 đội')">
            <i class="fa-solid fa-sitemap"></i> Vòng 16
          </div>
          <div class="nav-pill" onclick="renderKnockout('Vòng Tứ Kết')">
            <i class="fa-solid fa-trophy"></i> Tứ Kết
          </div>
          <div class="nav-pill" onclick="renderKnockout('Vòng Bán Kết')">
            <i class="fa-solid fa-bolt text-yellow-400"></i> Bán Kết
          </div>
          <div class="nav-pill" onclick="renderKnockout('Tranh Hạng Ba')">
            <i class="fa-solid fa-medal text-slate-400"></i> Hạng Ba
          </div>
          <div class="nav-pill text-white" onclick="triggerFinal()">
            <i class="fa-solid fa-crown text-yellow-400"></i> Chung Kết
          </div>
        </div>
      </div>
    </nav>

    <div class="pt-20 pb-10 flex flex-col items-center px-4">
      <h1
        class="text-4xl md:text-9xl font-black worldcup-font italic text-white uppercase tracking-tighter mb-8 text-center drop-shadow-2xl"
      >
        FIFA WORLD <span class="text-[#D4AF37]">CUP 2026</span>
      </h1>

      <!-- ===== LIVE & KẾT QUẢ ===== -->
      <div
        class="w-full max-w-6xl px-2 mb-16"
        id="live-section"
        style="display: none"
      >
        <div class="flex items-center gap-4 mb-2">
          <div
            class="h-px flex-1 bg-gradient-to-r from-transparent via-[#ff3b5c]/50 to-transparent"
          ></div>
          <h3
            class="worldcup-font text-lg md:text-2xl text-white uppercase italic tracking-widest"
          >
            <span class="live-dot"></span>Trực Tiếp
            <span class="text-[#D4AF37]">&amp; Kết Quả</span>
          </h3>
          <div
            class="h-px flex-1 bg-gradient-to-r from-transparent via-[#ff3b5c]/50 to-transparent"
          ></div>
        </div>
        <p id="live-status" class="text-center mb-6"></p>
        <div
          class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"
          id="live-grid"
        ></div>
      </div>

      <div class="w-full max-w-6xl px-2 mb-16" id="top-matches-section">
        <div class="flex items-center gap-4 mb-6">
          <div
            class="h-px flex-1 bg-gradient-to-r from-transparent via-[#D4AF37]/50 to-transparent"
          ></div>
          <h3
            class="worldcup-font text-lg md:text-2xl text-[#D4AF37] uppercase italic tracking-widest"
          >
            Trận đấu sắp tới
          </h3>
          <div
            class="h-px flex-1 bg-gradient-to-r from-transparent via-[#D4AF37]/50 to-transparent"
          ></div>
        </div>
        <div
          class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4"
          id="recent-grid"
        ></div>
      </div>
    </div>

    <div class="max-w-7xl mx-auto px-4 relative z-20">
      <div class="text-center mb-12">
        <h2
          id="display-title"
          class="worldcup-font text-4xl md:text-6xl text-white italic uppercase tracking-tighter mb-6 md:mb-10"
        >
          Vòng Bảng
        </h2>
        <div id="sub-navigation"></div>
      </div>
      <div
        id="main-display"
        class="glass p-4 md:p-16 rounded-[2rem] md:rounded-[4rem] mb-12 min-h-[400px] flex flex-col items-center"
      ></div>
      <div class="mt-4 text-center pb-20">
        <p
          class="text-[12px] text-slate-600 font-black uppercase tracking-[0.4em] mb-2"
        >
          Powered by
        </p>
        <p
          class="text-xl md:text-2xl font-black text-[#D4AF37] italic uppercase"
        >
          Erika
        </p>
      </div>
    </div>

      /* =========================================================
         LIVE — Tỉ số trực tiếp
         Nguồn 1 (ưu tiên): football-data.org QUA Cloudflare Worker
           -> dán URL Worker của bạn vào SCORES_PROXY_URL bên dưới.
              Token football-data.org nằm TRONG Worker, không nằm
              trong file này (GitHub Pages là public, không được

         Nguồn 2 (dự phòng): API công khai của FIFA, không cần key.
         API lỗi cả 2 -> trang vẫn hiện lịch tĩnh bình thường.
         ========================================================= */
      const SCORES_PROXY_URL = ""; // <-- dán URL Cloudflare Worker vào đây, ví dụ: "https://wc26-scores.tenban.workers.dev"

      // Mã FIFA (3 chữ) -> tên tiếng Việt dùng trong lịch
      const FIFA_VI = {
        MEX: "Mexico",
        RSA: "Nam Phi",
        KOR: "Hàn Quốc",

      // Tên tiếng Việt -> mã cờ (flagcdn) lấy từ groupTeams
      const FLAG_BY_NAME = {};
      Object.values(groupTeams).forEach((arr) =>
        arr.forEach((t) => (FLAG_BY_NAME[t.n] = t.c))
      );

      const FIFA_API = "https://api.fifa.com/api/v3";
      const WC_COMPETITION = "17"; // FIFA World Cup
      let liveMatches = []; // dữ liệu đã chuẩn hoá
      let scoreMap = {}; // key "Đội A|Đội B" (theo thứ tự alphabet) -> match
      let lastSync = null;
      let apiOk = false;

      function pairKey(a, b) {
        return [a, b].sort().join("|");
      }

      function teamVi(side) {
        if (!side) return null;
        const code = side.IdCountry || side.Abbreviation || "";
        return (
          FIFA_VI[code] ||
          (side.TeamName && side.TeamName[0] && side.TeamName[0].Description) ||
          side.ShortClubName ||
          code ||
          null
        );
      }

      function normalizeMatch(m) {
        const home = teamVi(m.Home);
        const away = teamVi(m.Away);
        if (!home || !away) return null;
        // MatchStatus của FIFA: 0 = kết thúc, 3 = đang đá, 1 = chưa đá
        const st = m.MatchStatus;
        return {
          home,
          away,
          hs: m.Home && m.Home.Score != null ? m.Home.Score : null,
          as: m.Away && m.Away.Score != null ? m.Away.Score : null,
          hp: m.HomeTeamPenaltyScore != null ? m.HomeTeamPenaltyScore : null,
          ap: m.AwayTeamPenaltyScore != null ? m.AwayTeamPenaltyScore : null,
          status: st === 3 ? "live" : st === 0 ? "ft" : "pre",
          minute: m.MatchTime || "",
          dateUtc: m.Date ? new Date(m.Date) : null,
        };
      }

      function vnTimeStr(date) {
        if (!date) return "";
        return date.toLocaleString("vi-VN", {
          timeZone: "Asia/Ho_Chi_Minh",
          hour: "2-digit",
          minute: "2-digit",
          day: "2-digit",
          month: "2-digit",
        });
      }

      async function fetchJson(url) {
        const r = await fetch(url, { headers: { Accept: "application/json" } });
        if (!r.ok) throw new Error("HTTP " + r.status);
        return r.json();
      }

      async function syncLive() {
        try {
          // 1) Toàn bộ trận World Cup trong khung thời gian giải
          const cal = await fetchJson(
            `${FIFA_API}/calendar/matches?idCompetition=${WC_COMPETITION}` +
              `&from=2026-06-10T00:00:00Z&to=2026-07-20T23:59:59Z` +
              `&language=en&count=500`
          );
          let results = (cal && cal.Results) || [];

          // 2) Trận đang live (cập nhật phút + tỉ số nhanh hơn)
          try {
            const live = await fetchJson(
              `${FIFA_API}/live/football/now?language=en`
            );
            const liveWc = ((live && live.Results) || []).filter(
              (m) => String(m.IdCompetition) === WC_COMPETITION
            );
            // ghi đè trận trùng nhau bằng dữ liệu live
            liveWc.forEach((lm) => {
              const i = results.findIndex((rm) => rm.IdMatch === lm.IdMatch);
              if (i >= 0) results[i] = lm;
              else results.push(lm);
            });
          } catch (e) {
            /* live endpoint lỗi thì vẫn dùng calendar */
          }

          liveMatches = results.map(normalizeMatch).filter(Boolean);
          scoreMap = {};
          liveMatches.forEach((m) => {
            scoreMap[pairKey(m.home, m.away)] = m;
          });
          apiOk = true;
          lastSync = new Date();
        } catch (e) {
          apiOk = false;
          console.warn("Không lấy được dữ liệu live:", e);
        }
        renderLiveSection();
        refreshActiveView();
      }

      // Tra tỉ số cho 1 cặp đấu trong lịch tĩnh
      function getScore(h, a) {
        const m = scoreMap[pairKey(h, a)];
        if (!m || m.status === "pre" || m.hs == null) return null;
        const flip = m.home !== h; // API đảo chủ/khách so với lịch tĩnh
        return {
          hs: flip ? m.as : m.hs,
          as: flip ? m.hs : m.as,
          hp: flip ? m.ap : m.hp,
          ap: flip ? m.hp : m.ap,
          status: m.status,
          minute: m.minute,
        };
      }

      // Chuỗi hiển thị ở giữa thay cho "vs"
      function centerHtml(h, a, fallbackHtml) {
        const s = getScore(h, a);
        if (!s) return fallbackHtml;
        const pen =
          s.hp != null && s.ap != null && (s.hp > 0 || s.ap > 0)
            ? `<span class="text-xs text-slate-400 font-bold"> (pen ${s.hp}-${s.ap})</span>`
            : "";
        const badge =
          s.status === "live"
            ? `<span class="live-badge ml-2"><span class="live-dot"></span>${
                s.minute || "LIVE"
              }</span>`
            : `<span class="ft-badge ml-2">FT</span>`;
        return `<span class="score-big">${s.hs} - ${s.as}</span>${pen}${badge}`;
      }

      function renderLiveSection() {
        const section = document.getElementById("live-section");
        const grid = document.getElementById("live-grid");
        const status = document.getElementById("live-status");

        if (!apiOk) {
          section.style.display = "none";
          return;
        }

        const now = Date.now();
        const playing = liveMatches.filter((m) => m.status === "live");
        const finished = liveMatches
          .filter(
            (m) =>
              m.status === "ft" &&
              m.dateUtc &&
              now - m.dateUtc.getTime() < 1000 * 60 * 60 * 48 // 48 giờ gần nhất
          )
          .sort((a, b) => b.dateUtc - a.dateUtc)
          .slice(0, 6);

        const show = [...playing, ...finished];
        if (!show.length) {
          section.style.display = "none";
          return;
        }
        section.style.display = "block";
        status.innerText =
          lastSync.toLocaleTimeString("vi-VN", {
            timeZone: "Asia/Ho_Chi_Minh",
            hour: "2-digit",
            minute: "2-digit",
          }) + " (UTC+7)";

        grid.innerHTML = show
          .map((m) => {
            const hc = FLAG_BY_NAME[m.home];
            const ac = FLAG_BY_NAME[m.away];
            const pen =
              m.hp != null && m.ap != null && (m.hp > 0 || m.ap > 0)
                ? `<span class="text-[11px] text-slate-400 font-bold">pen ${m.hp}-${m.ap}</span>`
                : "";
            const badge =
              m.status === "live"
                ? `<span class="live-badge"><span class="live-dot"></span>${
                    m.minute || "LIVE"
                  }</span>`
                : `<span class="ft-badge">FT</span>`;
            return `
            <div class="glass p-5 rounded-3xl border-l-4 ${
              m.status === "live" ? "border-l-[#ff3b5c]" : "border-l-[#00f2ff]"
            } hover:bg-white/5 transition-all">
              <div class="flex justify-between items-center mb-3">
                <span class="text-[11px] font-bold text-slate-500 uppercase">${vnTimeStr(
                  m.dateUtc
                )} (VN)</span>
                ${badge}
              </div>
              <div class="flex flex-col gap-2">
                <div class="flex items-center justify-between">
                  <div class="flex items-center gap-3">
                    ${
                      hc
                        ? `<img src="https://flagcdn.com/w40/${hc}.png" class="w-6 h-4">`
                        : ""
                    }
                    <span class="text-base font-black uppercase text-white">${
                      m.home
                    }</span>
                  </div>
                  <span class="score-big text-2xl">${
                    m.hs != null ? m.hs : "-"
                  }</span>
                </div>
                <div class="flex items-center justify-between">
                  <div class="flex items-center gap-3">
                    ${
                      ac
                        ? `<img src="https://flagcdn.com/w40/${ac}.png" class="w-6 h-4">`
                        : ""
                    }
                    <span class="text-base font-black uppercase text-white">${
                      m.away
                    }</span>
                  </div>
                  <span class="score-big text-2xl">${
                    m.as != null ? m.as : "-"

          .join("");
      }

      // Vẽ lại view đang mở để tỉ số mới chèn vào lịch
      let activeView = { type: "group", id: "A" };
      function refreshActiveView() {
        // Find the highlighted tab by its .active class, NOT by its visible text.
        // CSS `uppercase` changes what innerText returns ("BẢNG A" vs "Bảng A"),
        // so matching on text silently failed and the view never re-rendered
        // after live scores loaded — that's why the table sat at all zeros.
        const activeBtn = document.querySelector(".phase-btn.active");
        if (activeView.type === "group") {
          renderGroupIcons(activeView.id, activeBtn);
        } else if (activeView.type === "day") {
          renderVongBangDay(activeView.id, activeBtn);
        } else if (activeView.type === "standings") {
          renderStandings(activeView.id, activeBtn);
        } else if (activeView.type === "ko") {
          renderKnockout(activeView.id);
        } else if (activeView.type === "bracket") {
          renderBracket();
        }
        renderTopMatches();
      }

      /* =========================================================
         GROUP STANDINGS + ADVANCEMENT ODDS
         - Standings are built from live/finished scores (getScore).
         - Advancement odds use a Monte Carlo over ALL 12 groups at
           once: top 2 of each group + 8 best third-placed teams
           reach the Round of 32. Odds refresh with every new score.
         ========================================================= */

      // All 6 matches of one group, with the current score if any
      function groupMatches(groupId) {
        const out = [];
        for (const day in vongBangDays) {
          vongBangDays[day].forEach((m) => {
            if (m.g === groupId) {
              const s = getScore(m.h, m.a); // ft or live score, else null
              out.push({
                home: m.h,
                away: m.a,
                hs: s ? s.hs : null,
                as: s ? s.as : null,
                done: !!s,
              });
            }
          });
        }
        return out;
      }

      function blankTable(groupId) {
        const t = {};
        groupTeams[groupId].forEach((team) => {
          t[team.n] = {
            n: team.n,
            c: team.c,
            P: 0,
            W: 0,
            D: 0,
            L: 0,
            GF: 0,
            GA: 0,
            GD: 0,
            Pts: 0,
          };
        });
        return t;
      }

      function applyResult(table, home, away, hs, as) {
        const H = table[home],
          A = table[away];
        if (!H || !A) return;
        H.P++;
        A.P++;
        H.GF += hs;
        H.GA += as;
        A.GF += as;
        A.GA += hs;
        if (hs > as) {
          H.W++;
          H.Pts += 3;
          A.L++;
        } else if (hs < as) {
          A.W++;
          A.Pts += 3;
          H.L++;
        } else {
          H.D++;
          A.D++;
          H.Pts++;
          A.Pts++;
        }
        H.GD = H.GF - H.GA;
        A.GD = A.GF - A.GA;
      }

      // Tiebreak: points -> goal difference -> goals for -> name
      function rankCompare(a, b) {
        if (b.Pts !== a.Pts) return b.Pts - a.Pts;
        if (b.GD !== a.GD) return b.GD - a.GD;
        if (b.GF !== a.GF) return b.GF - a.GF;
        return a.n.localeCompare(b.n);
      }

      // Sorted standings of one group, built from known scores
      function computeStandings(groupId) {
        const table = blankTable(groupId);
        groupMatches(groupId).forEach((m) => {
          if (m.done && m.hs != null && m.as != null) {
            applyResult(table, m.home, m.away, m.hs, m.as);
          }
        });
        return Object.values(table).sort(rankCompare);
      }

      // Poisson goal sampler (Knuth), mean ~1.35 goals per team
      function samplePoisson(lambda) {
        const L = Math.exp(-lambda);
        let k = 0,
          p = 1;
        do {
          k++;
          p *= Math.random();
        } while (p > L);
        return k - 1;
      }

      const SIM_RUNS = 3000;

      // Monte Carlo: P(each team reaches Round of 32). Returns name -> 0..1
      function simulateAdvancement() {
        const groups = Object.keys(groupTeams);
        const fixed = {},
          pending = {};
        groups.forEach((g) => {
          fixed[g] = [];
          pending[g] = [];
          groupMatches(g).forEach((m) => {
            if (m.done && m.hs != null && m.as != null) {
              fixed[g].push({ home: m.home, away: m.away, hs: m.hs, as: m.as });
            } else {
              pending[g].push({ home: m.home, away: m.away });
            }
          });
        });

        const advCount = {};
        groups.forEach((g) =>
          groupTeams[g].forEach((t) => (advCount[t.n] = 0))
        );

        for (let run = 0; run < SIM_RUNS; run++) {
          const thirds = [];
          groups.forEach((g) => {
            const table = blankTable(g);
            fixed[g].forEach((m) =>
              applyResult(table, m.home, m.away, m.hs, m.as)
            );
            pending[g].forEach((m) =>
              applyResult(
                table,
                m.home,
                m.away,
                samplePoisson(1.35),
                samplePoisson(1.35)
              )
            );
            const ranked = Object.values(table).sort(rankCompare);
            advCount[ranked[0].n]++; // group winner advances
            advCount[ranked[1].n]++; // runner-up advances
            thirds.push(ranked[2]); // 3rd place fights for a wildcard
          });
          // 8 best third-placed teams advance
          thirds
            .sort(rankCompare)
            .slice(0, 8)
            .forEach((t) => advCount[t.n]++);
        }

        const probs = {};
        Object.keys(advCount).forEach(
          (n) => (probs[n] = advCount[n] / SIM_RUNS)
        );
        return probs;
      }

      // Coloured percentage cell
      function probCell(p) {
        if (p == null) return `<span class="text-slate-500">--</span>`;
        const pct = Math.round(p * 100);
        let color = "#64748b";
        if (pct >= 90) color = "#22c55e";
        else if (pct >= 40) color = "#f59e0b";
        else if (pct > 0) color = "#ef4444";
        return `<span style="color:${color}" class="font-black worldcup-font">${pct}%</span>`;
      }

        });

      }

      // Cache advancement odds: only re-run the Monte Carlo when scores change,
      // so switching between groups on the home page stays instant.
      let _advCache = { sig: "", probs: {} };
      function advancementOdds() {
        let sig = "";
        for (const d in vongBangDays) {
          for (const m of vongBangDays[d]) {
            const s = getScore(m.h, m.a);
            if (s) sig += m.h + s.hs + "-" + s.as + s.status + ";";
          }
        }
        if (sig !== _advCache.sig)
          _advCache = { sig, probs: simulateAdvancement() };
        return _advCache.probs;
      }

        return `

      function getTeamMatches(teamName) {

      // Ngày "12/06" + giờ "02:00" (VN) -> Date chuẩn UTC+7

      // ---- Resolve R32 group-based slots into real team names ----

      // True only when all 6 matches of a group are FINISHED (ft)
      function groupFinished(groupId) {
        let n = 0;
        for (const day in vongBangDays) {
          for (const m of vongBangDays[day]) {
            if (m.g === groupId) {
              const s = getScore(m.h, m.a);
              if (!s || s.status !== "ft") return false;
              n++;
            }
          }
        }
        return n === 6;
      }

      // Assign the 8 best third-placed teams to the 8 R32 "Thứ 3" slots.
      // Returns { "Thứ 3 ABCDF": teamName, ... }, or {} if not resolvable yet.
      function buildThirdMap() {
        const groups = Object.keys(groupTeams);
        if (!groups.every(groupFinished)) return {}; // need every group done
        const thirds = groups.map((g) => ({ g, team: computeStandings(g)[2] }));
        thirds.sort((a, b) => rankCompare(a.team, b.team));
        const qualified = thirds.slice(0, 8).map((x) => x.g); // 8 group letters

        const slots = (knockoutData["Vòng 32 đội"] || [])
          .flatMap((mt) => [mt.h, mt.a])
          .filter((l) => l.startsWith("Thứ 3"))
          .map((l) => ({
            label: l,
            allowed: l.replace("Thứ 3 ", "").split(""),
          }));

        // Match each qualified group to a slot whose allowed-set contains it
        const map = {};
        const used = new Set();
        function assign(i) {
          if (i === slots.length) return true;
          for (const g of qualified) {
            if (!used.has(g) && slots[i].allowed.includes(g)) {
              used.add(g);
              map[slots[i].label] = g;
              if (assign(i + 1)) return true;
              used.delete(g);
              delete map[slots[i].label];
            }
          }
          return false;
        }
        if (!assign(0)) return {};

        const out = {};
        Object.keys(map).forEach(
          (l) => (out[l] = computeStandings(map[l])[2].n)
        );
        return out;
      }

      // One slot label -> real team name, or null if not decided yet
      function resolveR32(label, thirdMap) {
        const gm = label.match(/bảng ([A-L])$/);
        if ((label.startsWith("Nhất") || label.startsWith("Nhì")) && gm) {
          const g = gm[1];
          if (!groupFinished(g)) return null;
          const rows = computeStandings(g);
          return label.startsWith("Nhất") ? rows[0].n : rows[1].n;
        }
        if (label.startsWith("Thứ 3")) return thirdMap[label] || null;
        return null; // "Thắng trận N" (vòng trong) chưa xử lý ở đây
      }

      // Slot HTML: real team + flag if known, else the dimmed placeholder
      // One slot -> flag + team name (Goldman) if known, else dimmed placeholder.
      // side "h": flag after name (home, right-aligned). side "a": flag before name (away).
      function slotHtml(label, thirdMap, side) {
        const team = resolveR32(label, thirdMap);
        if (!team) {
          return `<span class="min-w-0 font-bold uppercase text-slate-400 text-[11px] md:text-sm leading-tight opacity-80">${label}</span>`;
        }
        const code = FLAG_BY_NAME[team];
        const flag = code
          ? `<img src="https://flagcdn.com/w40/${code}.png" class="shrink-0 w-6 h-4 md:w-7 md:h-5 rounded-sm">`
          : "";
        const name = `<span class="min-w-0 worldcup-font uppercase text-white text-sm md:text-lg leading-tight">${team}</span>`;
        return side === "h" ? `${name}${flag}` : `${flag}${name}`;
      }

      function renderKnockout(phase) {
        activeView = { type: "ko", id: phase };
        toggleMenu(false);
        document.getElementById("top-matches-section").style.display = "none";
        document.getElementById("display-title").innerText = phase;
        document.getElementById("sub-navigation").innerHTML = "";
        const ms = knockoutData[phase] || [];
        const thirdMap = phase === "Vòng 32 đội" ? buildThirdMap() : {};
        document.getElementById("main-display").innerHTML = `
          <div class="space-y-3 md:space-y-4 w-full max-w-3xl">
            ${ms
              .map(
                (m) => `
              <div class="glass rounded-2xl md:rounded-3xl px-4 py-3.5 md:px-7 md:py-5">
                <div class="flex items-center justify-between mb-3">
                  <div class="flex items-baseline gap-2 min-w-0">
                    <span class="worldcup-font text-[#D4AF37] font-bold text-base md:text-xl leading-none">#${
                      m.t
                    }</span>
                    <span class="text-[10px] md:text-xs text-slate-500 font-bold uppercase tracking-wider">${
                      m.d
                    }</span>
                  </div>
                  <span class="worldcup-font text-[#00f2ff] font-bold text-lg md:text-2xl leading-none shrink-0">${
                    m.g
                  }</span>
                </div>
                <div class="flex items-center justify-center gap-2 md:gap-4">
                  <div class="flex-1 min-w-0 flex items-center justify-end gap-2 text-right">${slotHtml(
                    m.h,
                    thirdMap,
                    "h"
                  )}</div>
                  <span class="shrink-0 text-[#00f2ff] italic font-black text-[11px] md:text-sm opacity-40">VS</span>
                  <div class="flex-1 min-w-0 flex items-center justify-start gap-2 text-left">${slotHtml(
                    m.a,
                    thirdMap,
                    "a"
                  )}</div>
                </div>
              </div>`
              )
              .join("")}
          </div>`;
      }

      /* =========================================================
         SƠ ĐỒ (knockout bracket) — tất cả các vòng nằm cạnh nhau.
         Cột được xếp bằng cách duyệt cây từ Chung kết xuống, để mỗi
         cặp trận nằm sát trận vòng sau mà nó dẫn tới (đường nối thẳng
         hàng). Tên đội tự điền qua resolveR32 khi bảng xong; các vòng
         trong hiện "Thắng trận N" cho tới khi có kết quả knock-out.
         ========================================================= */
      let _bracketThirds = {};

      function allKoById() {
        const all = {};
        ["Vòng 32 đội", "Vòng 16 đội", "Vòng Tứ Kết", "Vòng Bán Kết"].forEach(
          (ph) => (knockoutData[ph] || []).forEach((m) => (all[m.t] = m))
        );
        all[104] = {
          t: 104,
          d: "20/07",
          g: "02:00",
          h: "Thắng trận 101",
          a: "Thắng trận 102",
        };
        return all;
      }

      function feederId(label) {
        const m = label.match(/trận (\d+)/);
        return m ? parseInt(m[1], 10) : null;
      }

      function roundTitle(id) {
        if (id <= 88) return "Vòng 32";
        if (id <= 96) return "Vòng 16";
        if (id <= 100) return "Tứ Kết";
        if (id <= 102) return "Bán Kết";
        return "Chung Kết";
      }

      // Ordered columns R32 -> Final, with paired matches adjacent
      function bracketColumns() {
        const all = allKoById();
        const order = {};
        function walk(id, depth) {
          const m = all[id];
          if (!order[depth]) order[depth] = [];
          if (!m) {
            order[depth].push(id);
            return;
          }
          const lh = feederId(m.h),
            la = feederId(m.a);
          const kids = (lh && all[lh]) || (la && all[la]);
          if (kids) {
            if (lh && all[lh]) walk(lh, depth + 1);
            if (la && all[la]) walk(la, depth + 1);
          }
          order[depth].push(id);
        }
        walk(104, 0);
        const depths = Object.keys(order)
          .map(Number)
          .sort((a, b) => b - a);
        return depths.map((d) => ({
          title: roundTitle(all[order[d][0]].t),
          matches: order[d].map((id) => all[id]),
        }));
      }

      // One team slot: flag + name if known, else shield + placeholder
      function bracketSlot(label) {
        const team = resolveR32(label, _bracketThirds);
        if (!team) {
          return `<div class="bk-t"><span class="bk-sh"><i class="fa-solid fa-shield-halved"></i></span><span class="bk-name bk-dim">${label}</span></div>`;
        }
        const code = FLAG_BY_NAME[team];
        const flag = code
          ? `<img src="https://flagcdn.com/w40/${code}.png" class="bk-flag">`
          : `<span class="bk-flag"></span>`;
        return `<div class="bk-t">${flag}<span class="bk-name">${team}</span></div>`;
      }

      function bracketCard(m, hasIncoming) {
        return `
    <div class="bk-card${hasIncoming ? " in" : ""}">
      <div class="bk-top">
        <span class="bk-no">#${m.t}</span>
        <span class="bk-when">${m.d} · <span class="bk-cy">${m.g}</span></span>
      </div>
      ${bracketSlot(m.h)}
      ${bracketSlot(m.a)}
    </div>`;
      }

      function bracketColumnHtml(col, isLast, isFirst) {
        let body;
        if (isLast) {
          body = `<div class="bk-pair">${bracketCard(
            col.matches[0],
            !isFirst
          )}</div>`;
        } else {
          const pairs = [];
          for (let i = 0; i < col.matches.length; i += 2) {
            pairs.push(
              `<div class="bk-pair j">${bracketCard(
                col.matches[i],
                !isFirst
              )}${bracketCard(col.matches[i + 1], !isFirst)}</div>`
            );
          }
          body = pairs.join("");
        }
        return `<div class="bk-round"><div class="bk-rtitle">${col.title}</div><div class="bk-body">${body}</div></div>`;
      }

      function renderBracket() {
        activeView = { type: "bracket" };
        toggleMenu(false);
        document.getElementById("top-matches-section").style.display = "none";
        document.getElementById("display-title").innerText = "Sơ Đồ";
        document.getElementById("sub-navigation").innerHTML = "";
        _bracketThirds = buildThirdMap();
        const cols = bracketColumns();
        const html = cols
          .map((col, i) =>
            bracketColumnHtml(col, i === cols.length - 1, i === 0)
          )
          .join("");
        document.getElementById(
          "main-display"
        ).innerHTML = `<div class="bk-scroll"><div class="bk-flow">${html}</div></div>`;
      }
      function triggerFinal() {
        activeView = { type: "final" };
        toggleMenu(false);
        document.getElementById("top-matches-section").style.display = "none";
        document.getElementById("display-title").innerText = "Chung Kết";
        document.getElementById("sub-navigation").innerHTML = "";
        confetti({
          particleCount: 300,
          spread: 120,
          origin: { y: 0.6 },
          colors: ["#ffffff", "#D4AF37", "#00f2ff"],
        });
        document.getElementById("main-display").innerHTML = `
          <div class="flex flex-col items-center justify-center py-6 w-full">
            <div class="glass p-6 md:p-16 rounded-[3rem] md:rounded-[5rem] border-2 border-[#D4AF37]/50 w-full max-w-4xl text-center shadow-[0_0_50px_rgba(212,175,55,0.2)]">
              <span class="block text-[#D4AF37] font-black text-5xl md:text-7xl worldcup-font mb-2 md:mb-4">#104</span>
              <span class="text-sm md:text-2xl text-slate-400 font-bold block mb-6 md:mb-12 tracking-[0.2em] md:tracking-[0.4em]">20 THÁNG 7, 2026</span>
              <div class="flex flex-col md:flex-row items-center justify-center gap-4 md:gap-10 mb-8 md:mb-10">
                <span class="text-2xl md:text-5xl font-black text-white uppercase">WINNER 101</span>
                <span class="text-[#D4AF37] worldcup-font text-4xl md:text-7xl italic">VS</span>
                <span class="text-2xl md:text-5xl font-black text-white uppercase">WINNER 102</span>
              </div>
              <p class="text-[#00f2ff] font-black text-5xl md:text-8xl worldcup-font tracking-tighter">02:00</p>
            </div>
          </div>`;
      }

      /* ===== Khởi động ===== */
      initHomeMode();
      syncLive(); // lấy tỉ số ngay khi mở trang
      setInterval(syncLive, 45 * 1000); // tự làm mới mỗi 45 giây
    </script>
  </body>
</html>
